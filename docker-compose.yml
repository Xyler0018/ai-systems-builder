services:
  ai-systems-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-systems-builder
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/dev.db"
      DOCKER_SQLITE_PATH: "/app/data/dev.db"
      ALLOW_PRODUCTION_DB_TOOLS: "true"
      APP_ACCESS_TOKEN: ""
    volumes:
      - ai-systems-builder-data:/app/data
    restart: unless-stopped

volumes:
  ai-systems-builder-data:
